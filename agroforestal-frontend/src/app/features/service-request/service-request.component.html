<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="text-center mb-10">
    <h1 class="section-title">Servicio Técnico Especializado</h1>
    <p class="section-subtitle">Tu equipo en manos expertas — completa el formulario y te contactamos en menos de 24 horas</p>
  </div>

  @if (success()) {
    <div class="bg-green-50 border border-green-200 rounded-xl p-8 text-center">
      <div class="text-5xl mb-4">✅</div>
      <h2 class="text-2xl font-bold text-green-800 mb-2">¡Solicitud enviada!</h2>
      <p class="text-green-600">Nos pondremos en contacto contigo muy pronto.</p>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 space-y-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo *</label>
          <input formControlName="name" type="text" class="input" placeholder="Tu nombre">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
          <input formControlName="email" type="email" class="input" placeholder="tu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
          <input formControlName="phone" type="tel" class="input" placeholder="+57 300 000 0000">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de servicio</label>
          <select formControlName="service_type" class="input">
            @for (type of serviceTypes; track type.value) {
              <option [value]="type.value">{{ type.label }}</option>
            }
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Marca del equipo</label>
          <input formControlName="equipment_brand" type="text" class="input" placeholder="STIHL, Honda, etc.">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Modelo del equipo</label>
          <input formControlName="equipment_model" type="text" class="input" placeholder="MS 250, GX160, etc.">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción del problema *</label>
        <textarea formControlName="problem_description" rows="5" class="input resize-none" placeholder="Describe detalladamente el problema o servicio que necesitas..."></textarea>
      </div>

      @if (error()) {
        <p class="text-red-600 text-sm bg-red-50 p-3 rounded-lg">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading() || form.invalid" class="btn-primary w-full justify-center text-lg py-4" [class.opacity-50]="form.invalid">
        @if (loading()) { <span>Enviando...</span> } @else { <span>Enviar solicitud de servicio</span> }
      </button>
    </form>
  }
</div>
